<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>住宅得獎案日報</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --line: rgba(255,255,255,.1);
      --text: #f0ebe3;
      --muted: rgba(240,235,227,.68);
      --gold: #e8d5a0;
      --mint: #a0c8b0;
      --shadow: 0 28px 80px rgba(0,0,0,.35);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(232,213,160,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(160,200,176,.08), transparent 24%),
        linear-gradient(180deg, #080808 0%, #0d0d0d 100%);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .page { max-width: 1440px; margin: 0 auto; padding: 40px 24px 80px; }
    .hero {
      padding: 36px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(232,213,160,.25);
      color: var(--gold);
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 12px;
    }
    h1 {
      margin: 18px 0 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      line-height: .98;
      max-width: 10ch;
    }
    .hero p {
      margin: 0;
      max-width: 56rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }
    .hero-meta {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .92rem;
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin-top: 32px;
    }
    .card {
      border: 1px solid var(--line);
      background: rgba(15,15,15,.92);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .slider {
      position: relative;
      width: 100%;
      height: min(70vh, 820px);
      background: #090909;
      overflow: hidden;
      outline: none;
    }
    .slides {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .4s ease;
      display: block;
    }
    .slide.active { opacity: 1; }
    .sl-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.48);
      color: var(--text);
      font-size: 2.4rem;
      line-height: 1;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, opacity .2s;
    }
    .sl-btn:hover { background: rgba(0,0,0,.75); }
    .sl-prev { left: 20px; }
    .sl-next { right: 20px; }
    .sl-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 20px 24px 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      background: linear-gradient(transparent, rgba(0,0,0,.6));
      pointer-events: none;
    }
    .sl-count {
      font-size: .85rem;
      color: rgba(255,255,255,.72);
      letter-spacing: .06em;
    }
    .photo-tag {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .photo-tag-d { background: rgba(232,213,160,.2); color: var(--gold); }
    .photo-tag-f { background: rgba(160,200,176,.22); color: var(--mint); }
    .photo-tag-a { background: rgba(214,176,122,.22); color: #d6b07a; }
    .card-body {
      padding: 28px 32px;
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, .85fr);
      align-items: start;
      gap: 32px;
    }
    .card-main {
      display: grid;
      gap: 14px;
      min-width: 0;
    }
    .card-side {
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .card-meta, .card-facts {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card-meta span, .card-facts span {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      font-size: .82rem;
    }
    .card-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.6rem, 2.2vw, 2.6rem);
      line-height: 1.08;
    }
    .card-by {
      margin: 0;
      color: var(--gold);
      letter-spacing: .03em;
      font-size: .95rem;
    }
    .card-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: .98rem;
    }
    .card-note {
      margin: 0;
      color: rgba(232,213,160,.88);
      line-height: 1.75;
      font-size: .9rem;
      padding-left: 14px;
      border-left: 1px solid rgba(232,213,160,.25);
    }
    .card-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card-links a {
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.02);
      font-size: .86rem;
    }
    @media (max-width: 799px) {
      .slider { height: min(50vh, 500px); }
      .card-body { grid-template-columns: 1fr; padding: 20px; }
      .sl-btn { width: 46px; height: 46px; font-size: 2rem; }
    }
    .slide { cursor: zoom-in; }
    #lb-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,.92);
      align-items: center;
      justify-content: center;
    }
    #lb-backdrop.open { display: flex; }
    #lb-img {
      max-width: calc(100% - 160px);
      max-height: 100%;
      object-fit: contain;
      pointer-events: none;
      border-radius: 4px;
    }
    #lb-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      font-size: 1.4rem;
      line-height: 1;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      font-size: 2.8rem;
      line-height: 1;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .lb-nav:hover { background: rgba(0,0,0,.75); }
    #lb-prev { left: 20px; }
    #lb-next { right: 20px; }
    #lb-count {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.7);
      font-size: .85rem;
      letter-spacing: .06em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="eyebrow">Residential Awards Digest</span>
      <h1>每天 6 點更新的住宅得獎案選輯</h1>
      <p>本頁收錄來自  的住宅案例，各來源優先選取最新兩案，若已在歷史記錄中使用過，便自動往更早案例遞補。圖片以全寬顯示，可直接在頁面內左右切換瀏覽，支援觸控滑動與鍵盤方向鍵。</p>
      <div class="hero-meta">
        <span>生成時間 2026-06-03 11:27</span>
        <span>共 0 件作品</span>
        <span></span>
        <span>每案最多 20 張圖片，超過時優先保留設計圖</span>
      </div>
      <div class="card-links" style="margin-top:18px;">
        <a href="https://yulife1289-dev.github.io/design-awards-public/design-awards-residential-2026-06-03.html" target="_blank" rel="noopener">查看今日 HTML</a>
        <a href="https://yulife1289-dev.github.io/design-awards-public/" target="_blank" rel="noopener">查看 latest 版本</a>
      </div>
    </section>
    <section class="grid">
      
    </section>
  </main>
  <div id="lb-backdrop" role="dialog" aria-modal="true" aria-label="原圖預覽">
    <img id="lb-img" src="" alt="">
    <button id="lb-close" aria-label="關閉">✕</button>
    <button id="lb-prev" class="lb-nav" aria-label="上一張">&#8249;</button>
    <button id="lb-next" class="lb-nav" aria-label="下一張">&#8250;</button>
    <span id="lb-count"></span>
  </div>
  <script>
    document.querySelectorAll('.slider').forEach(slider => {
      const slides = [...slider.querySelectorAll('.slide')];
      if (slides.length <= 1) {
        slider.querySelector('.sl-prev')?.remove();
        slider.querySelector('.sl-next')?.remove();
        return;
      }
      const countEl = slider.querySelector('.sl-count');
      let idx = 0;

      function show(n) {
        slides[idx].classList.remove('active');
        idx = ((n % slides.length) + slides.length) % slides.length;
        slides[idx].classList.add('active');
        slides[idx].loading = 'eager';
        if (countEl) countEl.textContent = (idx + 1) + ' / ' + slides.length;
      }

      slider.querySelector('.sl-prev').addEventListener('click', e => { e.stopPropagation(); show(idx - 1); });
      slider.querySelector('.sl-next').addEventListener('click', e => { e.stopPropagation(); show(idx + 1); });

      let tx = 0;
      slider.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive: true});
      slider.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 40) show(idx + (dx < 0 ? 1 : -1));
      });

      slider.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') show(idx - 1);
        if (e.key === 'ArrowRight') show(idx + 1);
      });
    });

    (function() {
      const backdrop = document.getElementById('lb-backdrop');
      const lbImg = document.getElementById('lb-img');
      const lbPrev = document.getElementById('lb-prev');
      const lbNext = document.getElementById('lb-next');
      const lbCount = document.getElementById('lb-count');
      let lbSlides = [], lbIdx = 0;
      function showAt(n) {
        lbIdx = ((n % lbSlides.length) + lbSlides.length) % lbSlides.length;
        lbImg.src = lbSlides[lbIdx].src;
        lbImg.alt = lbSlides[lbIdx].alt;
        lbCount.textContent = (lbIdx + 1) + ' / ' + lbSlides.length;
        lbPrev.style.display = lbSlides.length <= 1 ? 'none' : '';
        lbNext.style.display = lbSlides.length <= 1 ? 'none' : '';
      }
      function openLb(slides, startIdx) {
        lbSlides = slides;
        backdrop.classList.add('open');
        document.body.style.overflow = 'hidden';
        showAt(startIdx);
      }
      function closeLb() {
        backdrop.classList.remove('open');
        document.body.style.overflow = '';
        lbImg.src = '';
        lbSlides = [];
      }
      document.querySelectorAll('.slider').forEach(slider => {
        const slides = [...slider.querySelectorAll('.slide')];
        slides.forEach((img, i) => {
          img.addEventListener('click', () => openLb(slides, i));
        });
      });
      lbPrev.addEventListener('click', e => { e.stopPropagation(); showAt(lbIdx - 1); });
      lbNext.addEventListener('click', e => { e.stopPropagation(); showAt(lbIdx + 1); });
      backdrop.addEventListener('click', e => { if (e.target !== lbImg) closeLb(); });
      document.getElementById('lb-close').addEventListener('click', closeLb);
      let tx = 0;
      backdrop.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive: true});
      backdrop.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 40) showAt(lbIdx + (dx < 0 ? 1 : -1));
      });
      document.addEventListener('keydown', e => {
        if (!backdrop.classList.contains('open')) return;
        if (e.key === 'Escape') closeLb();
        if (e.key === 'ArrowLeft') showAt(lbIdx - 1);
        if (e.key === 'ArrowRight') showAt(lbIdx + 1);
      });
    })();
  </script>
</body>
</html>
